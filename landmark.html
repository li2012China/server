<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>地标 - LISSERVER</title>
  <link rel="stylesheet" href="style.css" />
  <link id="favicon" rel="icon" href="" type="image/png" />
  <style>
    .landmark-section {
      margin-top: 60px;
      padding: 60px 30px;
      min-height: calc(100vh - 60px - 200px);
    }

    .landmark-header {
      text-align: center;
      margin-bottom: 50px;
    }

    .landmark-title {
      font-size: 42px;
      font-weight: 300;
      color: var(--primary-color);
      margin-bottom: 15px;
    }

    .landmark-subtitle {
      font-size: 18px;
      color: #a2a2a2;
    }

    .landmark-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 30px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .landmark-card {
      background-color: #2a2a2a;
      border: 1px solid #333;
      border-left: 3px solid var(--primary-color);
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
    }

    .landmark-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
    }

    .landmark-poster {
      width: 100%;
      aspect-ratio: 16 / 9;
      background-color: #1f1f1f;
      overflow: hidden;
      position: relative;
    }

    .landmark-poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .landmark-info {
      padding: 20px;
      border-top: 1px solid #333;
    }

    .landmark-info h3 {
      font-size: 18px;
      color: white;
      font-weight: 400;
      margin: 0 0 10px 0;
    }

    .landmark-desc {
      font-size: 14px;
      color: #a2a2a2;
      margin: 0;
      line-height: 1.5;
    }

    @media (max-width: 768px) {
      .landmark-grid {
        grid-template-columns: 1fr;
      }

      .landmark-title {
        font-size: 32px;
      }

      .landmark-subtitle {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <a href="index.html" class="logo">
      <img id="server-icon" src="" alt="服务器图标" class="logo-icon-img" style="display: none;" />
      <div class="logo-icon" id="logo-fallback">⛏</div>
    </a>
    <div class="nav-links" id="nav-links">
      <a href="index.html">首页</a>
      <a href="menu.html">综合菜单</a>
      <a href="hall.html">名人堂</a>
      <a href="https://li2012china.github.io/" target="_blank">主站</a>
      <a href="https://qm.qq.com/q/Lep8hVQm0q" target="_blank" class="qq-group-btn">加入QQ群</a>
    </div>
    <button class="menu-toggle" id="menu-toggle" onclick="toggleMenu()">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </nav>
  <!-- 菜单背景遮罩 -->
  <div class="menu-overlay" id="menu-overlay" onclick="toggleMenu()"></div>

  <!-- 地标内容 -->
  <section class="landmark-section">
    <div class="landmark-header">
      <h1 class="landmark-title">服务器地标</h1>
      <p class="landmark-subtitle">探索服务器中的标志性建筑</p>
    </div>

    <div class="landmark-grid">
      <div class="landmark-card">
        <div class="landmark-poster">
          <img src="images/landmarks/caihongxinbiao.png" alt="彩虹信标" />
          
        </div>
        <div class="landmark-info">
          <h3>彩虹信标</h3>
          <p class="landmark-desc">默认文本</p>
        </div>
      </div>

      <div class="landmark-card">
        <div class="landmark-poster">
          <img src="images/landmarks/chuanshansuidao.png" alt="穿山隧道" />
          
        </div>
        <div class="landmark-info">
          <h3>穿山隧道</h3>
          <p class="landmark-desc">默认文本</p>
        </div>
      </div>

      <div class="landmark-card">
        <div class="landmark-poster">
          <img src="images/landmarks/jiaotang.png" alt="教堂" />
          
        </div>
        <div class="landmark-info">
          <h3>教堂</h3>
          <p class="landmark-desc">默认文本</p>
        </div>
      </div>

      <div class="landmark-card">
        <div class="landmark-poster">
          <img src="images/landmarks/thestudio.png" alt="The Studio" />
          
        </div>
        <div class="landmark-info">
          <h3>The Studio</h3>
          <p class="landmark-desc">默认文本</p>
        </div>
      </div>

      <div class="landmark-card">
        <div class="landmark-poster">
          <img src="images/landmarks/zhoujigonglu.png" alt="州际公路" />
          
        </div>
        <div class="landmark-info">
          <h3>州际公路</h3>
          <p class="landmark-desc">默认文本</p>
        </div>
      </div>

      <div class="landmark-card">
        <div class="landmark-poster">
          <img src="images/landmarks/zirankongdao.png" alt="自然空岛" />
          
        </div>
        <div class="landmark-info">
          <h3>自然空岛</h3>
          <p class="landmark-desc">默认文本</p>
        </div>
      </div>
    </div>
  </section>

  <!-- 页脚 -->
  <footer class="footer">
    <p>&copy; <span id="current-year"></span> LISSERVER. 作者：马太Matthew</p>
    <div class="footer-links">
      <a href="#home">返回顶部</a>
      <a href="http://103.85.86.51:22621" target="_blank">3D地图</a>
      <a href="http://play.simpfun.cn:42651/" target="_blank">后台</a>
    </div>
    <p class="footer-made-with">Made with ❤️ and AI.</p>
  </footer>

  <!-- 提示消息 -->
  <div class="toast" id="toast"></div>

  <script>
    // 显示提示消息
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    // 设置当前年份
    document.getElementById('current-year').textContent = new Date().getFullYear();

    // 切换移动端菜单
    function toggleMenu() {
      const navLinks = document.getElementById('nav-links');
      const menuToggle = document.getElementById('menu-toggle');
      const menuOverlay = document.getElementById('menu-overlay');
      navLinks.classList.toggle('active');
      menuToggle.classList.toggle('active');
      menuOverlay.classList.toggle('active');
    }

    // 点击导航链接后关闭菜单
    document.querySelectorAll('.nav-links a').forEach(link => {
      link.addEventListener('click', () => {
        const navLinks = document.getElementById('nav-links');
        const menuToggle = document.getElementById('menu-toggle');
        const menuOverlay = document.getElementById('menu-overlay');
        navLinks.classList.remove('active');
        menuToggle.classList.remove('active');
        menuOverlay.classList.remove('active');
      });
    });

    // 检查是否显示季节性彩蛋
    function checkSeasonalEasterEgg() {
      const now = new Date();
      const month = now.getMonth() + 1;

      if (month >= 3 && month <= 5) {
        if (Math.random() < 0.25) {
          const chickIcon = document.createElement('img');
          chickIcon.src = 'images/eggs/chick.png';
          chickIcon.alt = '小鸡彩蛋';
          chickIcon.className = 'logo-icon-img easter-egg';

          const logoContainer = document.querySelector('.logo');
          logoContainer.appendChild(chickIcon);

          return false;
        }
      }
      return false;
    }

    // 加载服务器图标
    async function loadServerIcon() {
      try {
        const response = await fetch('https://motdbe.blackbe.work/api/java?host=play.simpfun.cn:17125');
        if (response.ok) {
          const data = await response.json();
          if (data.favicon) {
            const serverIcon = document.getElementById('server-icon');
            const logoFallback = document.getElementById('logo-fallback');
            const favicon = document.getElementById('favicon');
            serverIcon.src = data.favicon;
            serverIcon.style.display = 'block';
            logoFallback.style.display = 'none';
            favicon.href = data.favicon;
          }
        }
      } catch (error) {
        console.error('加载服务器图标失败:', error);
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      const hasEasterEgg = checkSeasonalEasterEgg();
      if (!hasEasterEgg) {
        loadServerIcon();
      }
    });
  </script>
</body>
</html>
