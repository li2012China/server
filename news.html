<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>新闻 - LISSERVER</title>
  <link rel="stylesheet" href="style.css" />
  <link id="favicon" rel="icon" href="" type="image/png" />
  <script src="https://cdn.jsdelivr.net/npm/markdown-it/dist/markdown-it.min.js"></script>
  <style>
    /* 新闻页面样式 */
    .news-section {
      margin-top: 60px;
      padding: 60px 30px;
      min-height: calc(100vh - 60px - 200px);
    }
    
    .news-header {
      text-align: center;
      margin-bottom: 50px;
    }
    
    .news-title {
      font-size: 42px;
      font-weight: 300;
      color: var(--primary-color);
      margin-bottom: 15px;
    }
    
    .news-subtitle {
      font-size: 18px;
      color: #a2a2a2;
    }
    
    .news-grid {
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-width: 1000px;
      margin: 0 auto;
    }
    
    .news-card {
      background-color: #2a2a2a;
      border-left: 3px solid var(--primary-color);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
      overflow: hidden;
    }
    
    .news-card-content {
      display: flex;
      padding: 30px;
    }
    
    .news-card-image {
      flex-shrink: 0;
      width: 200px;
      margin-right: 20px;
    }
    
    .news-card-image img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    /* 新闻详情页图片样式 */
    .modal-content .news-content img {
      max-width: 100%;
      height: auto;
      margin: 10px 0;
    }
    
    .news-card-text {
      flex: 1;
    }
    
    .news-card-text.full-width {
      width: 100%;
    }
    
    .news-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
    }
    
    .news-card h3 {
      font-size: 20px;
      color: white;
      margin-bottom: 15px;
      font-weight: 400;
    }
    
    .news-card .news-date {
      font-size: 14px;
      color: #a2a2a2;
      margin-bottom: 20px;
    }
    
    .news-card .news-content {
      color: #a2a2a2;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    
    .news-card .news-link {
      color: var(--primary-color);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s ease;
    }
    
    .news-card .news-link:hover {
      text-decoration: underline;
    }
    
    .loading {
      text-align: center;
      padding: 60px 0;
      color: #a2a2a2;
    }
    
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid #333;
      border-top-color: var(--primary-color);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
    
    /* 模态框样式 */
    .modal {
      display: none;
      position: fixed;
      z-index: 2000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0, 0, 0, 0.9);
    }
    
    .modal-content {
      background-color: #2a2a2a;
      margin: 10% auto;
      padding: 40px;
      border: 1px solid #333;
      width: 80%;
      max-width: 800px;
      max-height: 80vh;
      overflow-y: auto;
      position: relative;
    }
    
    .modal-header {
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid #333;
    }
    
    .modal-title {
      font-size: 24px;
      color: var(--primary-color);
      margin-bottom: 10px;
    }
    
    .modal-date {
      font-size: 14px;
      color: #a2a2a2;
    }
    
    .modal-body {
      color: #a2a2a2;
      line-height: 1.6;
    }
    
    .modal-body p {
      margin-bottom: 15px;
    }
    
    .modal-body h2 {
      color: var(--primary-color);
      font-size: 20px;
      margin: 25px 0 15px;
      font-weight: 400;
    }
    
    .modal-body h3 {
      color: white;
      font-size: 18px;
      margin: 20px 0 10px;
      font-weight: 400;
    }
    
    .modal-body h4 {
      color: white;
      font-size: 16px;
      margin: 15px 0 8px;
      font-weight: 400;
    }
    
    .modal-body ul,
    .modal-body ol {
      margin: 15px 0;
      padding-left: 20px;
    }
    
    .modal-body ul {
      list-style: none;
    }
    
    .modal-body ol {
      list-style: decimal;
    }
    
    .modal-body li {
      margin-bottom: 8px;
      line-height: 1.5;
    }
    
    .modal-body li input[type="checkbox"] {
      margin-right: 10px;
      flex-shrink: 0;
    }
    
    .modal-body code {
      background-color: #333;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
    }
    
    .modal-body pre {
      background-color: #333;
      padding: 15px;
      border-radius: 5px;
      overflow-x: auto;
      margin: 15px 0;
    }
    
    .modal-body pre code {
      background-color: transparent;
      padding: 0;
    }
    
    .modal-body img {
      max-width: 100%;
      height: auto;
      border-radius: 5px;
      margin: 15px 0;
      display: block;
    }
    
    .files-section {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #333;
    }
    
    .files-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .file-item {
      margin-bottom: 15px;
      border: 1px solid #333;
      border-radius: 5px;
      overflow: hidden;
    }
    
    .file-info {
      display: flex;
      align-items: center;
      padding: 15px;
      background-color: #333;
    }
    
    .file-icon {
      font-size: 24px;
      margin-right: 15px;
    }
    
    .file-details {
      flex: 1;
    }
    
    .file-name {
      font-weight: 500;
      font-size: 16px;
      margin-bottom: 5px;
    }
    
    .file-size {
      font-size: 14px;
      color: #a2a2a2;
    }
    
    .file-buttons {
      display: flex;
      gap: 10px;
    }
    
    .download-btn {
      padding: 8px 20px;
      border: none;
      border-radius: 0;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: all 0.2s ease;
    }
    
    .download-btn.normal {
      background-color: transparent;
      color: white;
      border: 1px solid white;
    }
    
    .download-btn.normal:hover {
      background-color: rgba(255, 255, 255, 0.1);
    }
    
    .download-btn.domestic {
      background-color: #0078d7;
      color: white;
    }
    
    .download-btn.domestic:hover {
      background-color: #0063b1;
    }
    
    .modal-body a {
      color: var(--primary-color);
      text-decoration: none;
      transition: color 0.2s ease;
    }
    
    .modal-body a:hover {
      text-decoration: underline;
    }
    
    .modal-body strong {
      color: white;
      font-weight: 600;
    }
    
    .modal-body em {
      font-style: italic;
    }
    
    .close {
      color: #a2a2a2;
      float: right;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
      position: absolute;
      top: 20px;
      right: 30px;
    }
    
    .close:hover {
      color: white;
    }
    
    /* 响应式设计 */
    @media (max-width: 768px) {
      .news-grid {
        max-width: 100%;
      }
      
      .news-card-content {
        flex-direction: column;
        padding: 20px;
      }
      
      .news-card-image {
        width: 100%;
        margin-right: 0;
        margin-bottom: 15px;
      }
      
      .news-card-image img {
        height: 200px;
      }
      
      .modal-content {
        width: 95%;
        margin: 20% auto;
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <a href="index.html" class="logo">
      <img id="server-icon" src="" alt="服务器图标" class="logo-icon-img" style="display: none;" />
      <div class="logo-icon" id="logo-fallback">⛏</div>
    </a>
    <div class="nav-links" id="nav-links">
      <a href="index.html">首页</a>
      <a href="news.html">新闻</a>
      <a href="hall.html">名人堂</a>
      <a href="eula.html">用户协议</a>
      <a href="https://li2012china.github.io/" target="_blank">主站</a>
      <a href="https://qm.qq.com/q/Lep8hVQm0q" target="_blank" class="qq-group-btn">加入QQ群</a>
    </div>
    <button class="menu-toggle" id="menu-toggle" onclick="toggleMenu()">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </nav>
  <!-- 菜单背景遮罩 -->
  <div class="menu-overlay" id="menu-overlay" onclick="toggleMenu()"></div>

  <!-- 新闻页面 -->
  <section class="news-section">
    <div class="news-header">
      <h1 class="news-title">服务器新闻</h1>
      <p class="news-subtitle">最新服务器动态和更新信息</p>
    </div>
    
    <div class="loading" id="loading">
      <div class="loading-spinner"></div>
      <p>加载新闻中...</p>
    </div>
    
    <div class="news-grid" id="news-grid"></div>
  </section>

  <!-- 新闻详情模态框 -->
  <div class="modal" id="news-modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title"></h2>
        <p class="modal-date" id="modal-date"></p>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- 页脚 -->
  <footer class="footer">
    <p>&copy; <span id="current-year"></span> LISSERVER. 作者：马太Matthew</p>
    <div class="footer-links">
      <a href="#home">返回顶部</a>
      <a href="http://103.85.86.51:22621" target="_blank">3D地图</a>
      <a href="http://play.simpfun.cn:42651/" target="_blank">后台</a>
    </div>
    <p class="footer-made-with">Made with ❤️ and AI.</p>
  </footer>

  <script>
    // 设置当前年份
    document.getElementById('current-year').textContent = new Date().getFullYear();

    // 切换移动端菜单
    function toggleMenu() {
      const navLinks = document.getElementById('nav-links');
      const menuToggle = document.getElementById('menu-toggle');
      const menuOverlay = document.getElementById('menu-overlay');
      navLinks.classList.toggle('active');
      menuToggle.classList.toggle('active');
      menuOverlay.classList.toggle('active');
    }

    // 点击导航链接后关闭菜单
    document.querySelectorAll('.nav-links a').forEach(link => {
      link.addEventListener('click', () => {
        const navLinks = document.getElementById('nav-links');
        const menuToggle = document.getElementById('menu-toggle');
        const menuOverlay = document.getElementById('menu-overlay');
        navLinks.classList.remove('active');
        menuToggle.classList.remove('active');
        menuOverlay.classList.remove('active');
      });
    });

    // 平滑滚动
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function (e) {
        e.preventDefault();
        const target = document.querySelector(this.getAttribute('href'));
        if (target) {
          target.scrollIntoView({
            behavior: 'smooth',
            block: 'start'
          });
        }
      });
    });

    // 获取新闻数据
    async function fetchNews() {
      const loading = document.getElementById('loading');
      const newsGrid = document.getElementById('news-grid');
      
      try {
        // 从GitHub API获取releases数据
        const response = await fetch('https://api.github.com/repos/li2012China/server/releases');
        
        if (!response.ok) {
          throw new Error('API响应失败');
        }
        
        const releases = await response.json();
        
        // 按发布时间排序（最新的在前）
        releases.sort((a, b) => new Date(b.published_at) - new Date(a.published_at));
        
        // 隐藏加载状态
        loading.style.display = 'none';
        
        // 生成新闻卡片
        releases.forEach(release => {
          const newsCard = document.createElement('div');
          newsCard.className = 'news-card';
          newsCard.onclick = () => openModal(release);
          
          // 格式化日期
          const date = new Date(release.published_at);
          const formattedDate = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
          
          // 提取内容摘要并解析Markdown
          const content = release.body || '无内容';
          // 使用markdown-it库解析Markdown
          const md = window.markdownit({
            html: true,
            breaks: true,
            linkify: true
          });
          // 解析Markdown为HTML
          let parsedContent = md.render(content);
          // 移除HTML标签，只保留纯文本
          const plainText = parsedContent.replace(/<[^>]*>/g, '');
          // 提取摘要
          const summary = plainText.substring(0, 150) + (plainText.length > 150 ? '...' : '');
          
          // 提取新闻中的第一张图片
          let firstImage = null;
          const imgMatch = content.match(/!\[.*?\]\((.*?)\)/);
          if (imgMatch && imgMatch[1]) {
            firstImage = imgMatch[1];
          }
          
          // 生成新闻卡片HTML
          if (firstImage) {
            newsCard.innerHTML = `
              <div class="news-card-content">
                <div class="news-card-image">
                  <img src="${firstImage}" alt="新闻图片" />
                </div>
                <div class="news-card-text">
                  <h3>${release.name || '无标题'}</h3>
                  <div class="news-date">发布时间: ${formattedDate}</div>
                  <div class="news-content">${summary}</div>
                  <a href="#" class="news-link">查看详情</a>
                </div>
              </div>
            `;
          } else {
            // 随机使用banner中的一张图片
            const bannerImages = ['images/banner1.png', 'images/banner2.png', 'images/banner3.png'];
            const randomBanner = bannerImages[Math.floor(Math.random() * bannerImages.length)];
            newsCard.innerHTML = `
              <div class="news-card-content">
                <div class="news-card-image">
                  <img src="${randomBanner}" alt="新闻图片" />
                </div>
                <div class="news-card-text">
                  <h3>${release.name || '无标题'}</h3>
                  <div class="news-date">发布时间: ${formattedDate}</div>
                  <div class="news-content">${summary}</div>
                  <a href="#" class="news-link">查看详情</a>
                </div>
              </div>
            `;
          }
          
          newsGrid.appendChild(newsCard);
        });
        
      } catch (error) {
        console.error('获取新闻失败:', error);
        loading.innerHTML = '<p>加载失败，请刷新页面重试</p>';
      }
    }

    // 打开新闻详情模态框
    function openModal(release) {
      const modal = document.getElementById('news-modal');
      const modalTitle = document.getElementById('modal-title');
      const modalDate = document.getElementById('modal-date');
      const modalBody = document.getElementById('modal-body');
      
      // 格式化日期
      const date = new Date(release.published_at);
      const formattedDate = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
      
      // 填充内容
      modalTitle.textContent = release.name || '无标题';
      modalDate.textContent = `发布时间: ${formattedDate}`;
      
      // 处理Markdown内容
      let bodyContent = release.body || '无内容';
      // 使用markdown-it库解析Markdown
      const md = window.markdownit({
        html: true,
        breaks: true,
        linkify: true
      });
      
      // 解析Markdown为HTML
      bodyContent = md.render(bodyContent);
      
      // 处理任务列表样式
      bodyContent = bodyContent.replace(/\[ \]/g, '<input type="checkbox" disabled>');
      bodyContent = bodyContent.replace(/\[x\]/g, '<input type="checkbox" disabled checked>');
      
      modalBody.innerHTML = bodyContent;
      
      // 显示文件列表（如果有）
      if (release.assets && release.assets.length > 0) {
        const filesContainer = document.createElement('div');
        filesContainer.className = 'files-section';
        filesContainer.innerHTML = `
          <h3>附件文件</h3>
          <div class="files-list"></div>
        `;
        
        const filesList = filesContainer.querySelector('.files-list');
        release.assets.forEach(asset => {
          const fileItem = document.createElement('div');
          fileItem.className = 'file-item';
          fileItem.innerHTML = `
            <div class="file-info">
              <div class="file-icon">📁</div>
              <div class="file-details">
                <div class="file-name">${asset.name}</div>
                <div class="file-size">${(asset.size / (1024 * 1024)).toFixed(2)} MB</div>
              </div>
              <div class="file-buttons">
                <a href="${asset.browser_download_url}" target="_blank" class="download-btn normal">普通下载</a>
                <a href="https://edgeone.gh-proxy.org/${asset.browser_download_url}" target="_blank" class="download-btn domestic">国内线路</a>
              </div>
            </div>
          `;
          filesList.appendChild(fileItem);
        });
        
        modalBody.appendChild(filesContainer);
      }
      
      // 显示模态框
      modal.style.display = 'block';
      
      // 点击模态框外部关闭
      window.onclick = function(event) {
        if (event.target == modal) {
          closeModal();
        }
      };
    }

    // 关闭模态框
    function closeModal() {
      document.getElementById('news-modal').style.display = 'none';
    }

    // 获取服务器图标
    async function loadServerIcon() {
      try {
        // 查询 Java 版服务器 - 使用 motdbe.blackbe.work API
        const response = await fetch('https://motdbe.blackbe.work/api/java?host=play.simpfun.cn:17125');

        if (!response.ok) {
          throw new Error('API 响应错误: ' + response.status);
        }

        const data = await response.json();
        
        // 更新服务器图标
        if (data.favicon) {
          const serverIcon = document.getElementById('server-icon');
          const logoFallback = document.getElementById('logo-fallback');
          const favicon = document.getElementById('favicon');
          serverIcon.src = data.favicon;
          serverIcon.style.display = 'block';
          logoFallback.style.display = 'none';
          // 更新标签页图标
          favicon.href = data.favicon;
        }
      } catch (error) {
        console.error('获取服务器图标失败:', error);
        // 失败时使用默认图标
      }
    }

    // 页面加载时获取新闻和服务器图标
    document.addEventListener('DOMContentLoaded', function() {
      fetchNews();
      loadServerIcon();
    });
  </script>
</body>
</html>
