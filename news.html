<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>新闻 - LISSERVER</title>
  <link rel="stylesheet" href="style.css" />
  <link id="favicon" rel="icon" href="" type="image/png" />
  <style>
    /* 新闻页面样式 */
    .news-section {
      margin-top: 60px;
      padding: 60px 30px;
      min-height: calc(100vh - 60px - 200px);
    }
    
    .news-header {
      text-align: center;
      margin-bottom: 50px;
    }
    
    .news-title {
      font-size: 42px;
      font-weight: 300;
      color: var(--primary-color);
      margin-bottom: 15px;
    }
    
    .news-subtitle {
      font-size: 18px;
      color: #a2a2a2;
    }
    
    .news-grid {
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-width: 800px;
      margin: 0 auto;
    }
    
    .news-card {
      background-color: #2a2a2a;
      border-left: 3px solid var(--primary-color);
      padding: 30px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
    }
    
    .news-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
    }
    
    .news-card h3 {
      font-size: 20px;
      color: white;
      margin-bottom: 15px;
      font-weight: 400;
    }
    
    .news-card .news-date {
      font-size: 14px;
      color: #a2a2a2;
      margin-bottom: 20px;
    }
    
    .news-card .news-content {
      color: #a2a2a2;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    
    .news-card .news-link {
      color: var(--primary-color);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s ease;
    }
    
    .news-card .news-link:hover {
      text-decoration: underline;
    }
    
    .loading {
      text-align: center;
      padding: 60px 0;
      color: #a2a2a2;
    }
    
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid #333;
      border-top-color: var(--primary-color);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
    
    /* 模态框样式 */
    .modal {
      display: none;
      position: fixed;
      z-index: 2000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0, 0, 0, 0.9);
    }
    
    .modal-content {
      background-color: #2a2a2a;
      margin: 10% auto;
      padding: 40px;
      border: 1px solid #333;
      width: 80%;
      max-width: 800px;
      max-height: 80vh;
      overflow-y: auto;
      position: relative;
    }
    
    .modal-header {
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid #333;
    }
    
    .modal-title {
      font-size: 24px;
      color: var(--primary-color);
      margin-bottom: 10px;
    }
    
    .modal-date {
      font-size: 14px;
      color: #a2a2a2;
    }
    
    .modal-body {
      color: #a2a2a2;
      line-height: 1.6;
    }
    
    .modal-body p {
      margin-bottom: 15px;
    }
    
    .modal-body h2 {
      color: var(--primary-color);
      font-size: 20px;
      margin: 25px 0 15px;
      font-weight: 400;
    }
    
    .modal-body h3 {
      color: white;
      font-size: 18px;
      margin: 20px 0 10px;
      font-weight: 400;
    }
    
    .modal-body h4 {
      color: white;
      font-size: 16px;
      margin: 15px 0 8px;
      font-weight: 400;
    }
    
    .modal-body ul,
    .modal-body ol {
      margin: 15px 0;
      padding-left: 25px;
    }
    
    .modal-body li {
      margin-bottom: 8px;
    }
    
    .modal-body .task-list {
      list-style: none;
      padding-left: 20px;
    }
    
    .modal-body .task-list-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .modal-body .task-list-item input[type="checkbox"] {
      margin: 0;
      flex-shrink: 0;
    }
    
    .modal-body a {
      color: var(--primary-color);
      text-decoration: none;
      transition: color 0.2s ease;
    }
    
    .modal-body a:hover {
      text-decoration: underline;
    }
    
    .modal-body strong {
      color: white;
      font-weight: 600;
    }
    
    .modal-body em {
      font-style: italic;
    }
    
    .close {
      color: #a2a2a2;
      float: right;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
      position: absolute;
      top: 20px;
      right: 30px;
    }
    
    .close:hover {
      color: white;
    }
    
    /* 响应式设计 */
    @media (max-width: 768px) {
      .news-grid {
        max-width: 100%;
      }
      
      .news-card {
        padding: 20px;
      }
      
      .modal-content {
        width: 95%;
        margin: 20% auto;
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="logo">
      <img id="server-icon" src="" alt="服务器图标" class="logo-icon-img" style="display: none;" />
      <div class="logo-icon" id="logo-fallback">⛏</div>
    </div>
    <div class="nav-links" id="nav-links">
      <a href="index.html">首页</a>
      <a href="news.html">新闻</a>
      <a href="hall.html">名人堂</a>
      <a href="eula.html">用户协议</a>
      <a href="https://qm.qq.com/q/Lep8hVQm0q" target="_blank" class="qq-group-btn">加入QQ群</a>
    </div>
    <button class="menu-toggle" id="menu-toggle" onclick="toggleMenu()">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </nav>
  <!-- 菜单背景遮罩 -->
  <div class="menu-overlay" id="menu-overlay" onclick="toggleMenu()"></div>

  <!-- 新闻页面 -->
  <section class="news-section">
    <div class="news-header">
      <h1 class="news-title">服务器新闻</h1>
      <p class="news-subtitle">最新服务器动态和更新信息</p>
    </div>
    
    <div class="loading" id="loading">
      <div class="loading-spinner"></div>
      <p>加载新闻中...</p>
    </div>
    
    <div class="news-grid" id="news-grid"></div>
  </section>

  <!-- 新闻详情模态框 -->
  <div class="modal" id="news-modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title"></h2>
        <p class="modal-date" id="modal-date"></p>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- 页脚 -->
  <footer class="footer">
    <p>&copy; <span id="current-year"></span> LISSERVER. 作者：马太Matthew</p>
    <div class="footer-links">
      <a href="#home">返回顶部</a>
      <a href="http://103.85.86.51:22621" target="_blank">3D地图</a>
    </div>
    <p class="footer-made-with">Made with ❤️ and AI.</p>
  </footer>

  <script>
    // 设置当前年份
    document.getElementById('current-year').textContent = new Date().getFullYear();

    // 切换移动端菜单
    function toggleMenu() {
      const navLinks = document.getElementById('nav-links');
      const menuToggle = document.getElementById('menu-toggle');
      const menuOverlay = document.getElementById('menu-overlay');
      navLinks.classList.toggle('active');
      menuToggle.classList.toggle('active');
      menuOverlay.classList.toggle('active');
    }

    // 点击导航链接后关闭菜单
    document.querySelectorAll('.nav-links a').forEach(link => {
      link.addEventListener('click', () => {
        const navLinks = document.getElementById('nav-links');
        const menuToggle = document.getElementById('menu-toggle');
        const menuOverlay = document.getElementById('menu-overlay');
        navLinks.classList.remove('active');
        menuToggle.classList.remove('active');
        menuOverlay.classList.remove('active');
      });
    });

    // 平滑滚动
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function (e) {
        e.preventDefault();
        const target = document.querySelector(this.getAttribute('href'));
        if (target) {
          target.scrollIntoView({
            behavior: 'smooth',
            block: 'start'
          });
        }
      });
    });

    // 获取新闻数据
    async function fetchNews() {
      const loading = document.getElementById('loading');
      const newsGrid = document.getElementById('news-grid');
      
      try {
        // 从GitHub API获取releases数据
        const response = await fetch('https://api.github.com/repos/li2012China/server/releases');
        
        if (!response.ok) {
          throw new Error('API响应失败');
        }
        
        const releases = await response.json();
        
        // 按发布时间排序（最新的在前）
        releases.sort((a, b) => new Date(b.published_at) - new Date(a.published_at));
        
        // 隐藏加载状态
        loading.style.display = 'none';
        
        // 生成新闻卡片
        releases.forEach(release => {
          const newsCard = document.createElement('div');
          newsCard.className = 'news-card';
          newsCard.onclick = () => openModal(release);
          
          // 格式化日期
          const date = new Date(release.published_at);
          const formattedDate = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
          
          // 提取内容摘要
          const content = release.body || '无内容';
          const summary = content.substring(0, 150) + (content.length > 150 ? '...' : '');
          
          newsCard.innerHTML = `
            <h3>${release.name || '无标题'}</h3>
            <div class="news-date">发布时间: ${formattedDate}</div>
            <div class="news-content">${summary}</div>
            <a href="#" class="news-link">查看详情</a>
          `;
          
          newsGrid.appendChild(newsCard);
        });
        
      } catch (error) {
        console.error('获取新闻失败:', error);
        loading.innerHTML = '<p>加载失败，请刷新页面重试</p>';
      }
    }

    // 打开新闻详情模态框
    function openModal(release) {
      const modal = document.getElementById('news-modal');
      const modalTitle = document.getElementById('modal-title');
      const modalDate = document.getElementById('modal-date');
      const modalBody = document.getElementById('modal-body');
      
      // 格式化日期
      const date = new Date(release.published_at);
      const formattedDate = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
      
      // 填充内容
      modalTitle.textContent = release.name || '无标题';
      modalDate.textContent = `发布时间: ${formattedDate}`;
      
      // 处理Markdown内容
      let bodyContent = release.body || '无内容';
      // 增强的Markdown转HTML
      
      // 处理段落
      bodyContent = bodyContent.replace(/^([^\n]+)(\n|$)/gm, '<p>$1</p>');
      
      // 处理粗体和斜体
      // 先处理粗体加斜体 (***text***)
      bodyContent = bodyContent.replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>');
      // 再处理粗体 (**text**)
      bodyContent = bodyContent.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      // 最后处理斜体 (*text*)
      bodyContent = bodyContent.replace(/\*(.*?)\*/g, '<em>$1</em>');
      
      // 处理无序列表
      bodyContent = bodyContent.replace(/(^|\n)(-|\*)\s+(.+)/g, '$1<li>$3</li>');
      bodyContent = bodyContent.replace(/(<li>.*?<\/li>)/gs, '<ul>$1</ul>');
      
      // 处理有序列表
      bodyContent = bodyContent.replace(/(^|\n)(\d+)\.\s+(.+)/g, '$1<li>$3</li>');
      bodyContent = bodyContent.replace(/(<li>.*?<\/li>)/gs, '<ol>$1</ol>');
      
      // 处理任务列表
      bodyContent = bodyContent.replace(/(^|\n)-\s+\[ \]\s+(.+)/g, '$1<li class="task-list-item"><input type="checkbox" disabled> $2</li>');
      bodyContent = bodyContent.replace(/(^|\n)-\s+\[x\]\s+(.+)/g, '$1<li class="task-list-item"><input type="checkbox" disabled checked> $2</li>');
      bodyContent = bodyContent.replace(/(<li class="task-list-item">.*?<\/li>)/gs, '<ul class="task-list">$1</ul>');
      
      // 处理链接
      bodyContent = bodyContent.replace(/\[([^\]]+)\]\(([^\)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
      
      // 处理标题
      bodyContent = bodyContent.replace(/^# (.*)$/gm, '<h2>$1</h2>');
      bodyContent = bodyContent.replace(/^## (.*)$/gm, '<h3>$1</h3>');
      bodyContent = bodyContent.replace(/^### (.*)$/gm, '<h4>$1</h4>');
      
      modalBody.innerHTML = bodyContent;
      
      // 显示模态框
      modal.style.display = 'block';
      
      // 点击模态框外部关闭
      window.onclick = function(event) {
        if (event.target == modal) {
          closeModal();
        }
      };
    }

    // 关闭模态框
    function closeModal() {
      document.getElementById('news-modal').style.display = 'none';
    }

    // 页面加载时获取新闻
    document.addEventListener('DOMContentLoaded', fetchNews);
  </script>
</body>
</html>
